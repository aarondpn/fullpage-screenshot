<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Monitor body -->
  <rect x="12" y="20" width="104" height="80" rx="10" ry="10" fill="#1a7a63" />

  <!-- Screen area -->
  <rect x="22" y="30" width="84" height="60" rx="4" ry="4" fill="#ffffff" />

  <!-- Dashed selection lines -->
  <rect x="32" y="40" width="64" height="40" rx="2" ry="2" fill="none" stroke="#1a7a63" stroke-width="2.5" stroke-dasharray="6,3" />

  <!-- Monitor stand -->
  <rect x="50" y="100" width="28" height="8" rx="2" ry="2" fill="#1a7a63" />
  <rect x="42" y="108" width="44" height="6" rx="3" ry="3" fill="#1a7a63" />

  <!-- Capture indicator -->
  <circle cx="64" cy="55" r="8" fill="#1a7a63" opacity="0.3" />
  <circle cx="64" cy="55" r="4" fill="#1a7a63" />
</svg>
